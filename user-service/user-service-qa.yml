spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/user_db
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:user_service_user}
    password: ${DB_PASSWORD:user_service_user}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        type:
          enum:
            ddl:
              style: varchar

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

  instance:
    prefer-ip-address: true