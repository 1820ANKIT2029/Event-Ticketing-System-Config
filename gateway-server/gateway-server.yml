server:
  port: 8080

spring:
  application:
    name: gateway-server

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: event-service
              uri: lb://EVENT-SERVICE
              predicates:
                - Path=/event/**
              filters:
                - RewritePath=/event/(?<segment>.*), /${segment}

            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/inventory/**
              filters:
                - RewritePath=/inventory/(?<segment>.*), /${segment}

            - id: booking-service
              uri: lb://BOOKING-SERVICE
              predicates:
                - Path=/booking/**
              filters:
                - RewritePath=/booking/(?<segment>.*), /${segment}

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user/**,/auth/**
              filters:
                - RewritePath=/user/(?<segment>.*), /${segment}

            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payment/**
              filters:
                - RewritePath=/payment/(?<segment>.*), /${segment}

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/notification/**
              filters:
                - RewritePath=/notification/(?<segment>.*), /${segment}

            - id: search-service
              uri: lb://SEARCH-SERVICE
              predicates:
                - Path=/search/**
              filters:
                - RewritePath=/search/(?<segment>.*), /${segment}

            - id: analytics-service
              uri: lb://ANALYTICS-SERVICE
              predicates:
                - Path=/analytics/**
              filters:
                - RewritePath=/analytics/(?<segment>.*), /${segment}

    config:
      enabled: true
      uri: ${CONFIG_SERVER_URL:http://localhost:8888}

  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

jwt:
  secret: ${JWT_SECRET:82a3beb52b097b3fab2628cb35162a4c767833a91c257a16f6ec69de88b98284}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Event Service
        url: /event/v3/api-docs
      - name: Inventory Service
        url: /inventory/v3/api-docs
      - name: Booking Service
        url: /booking/v3/api-docs
      - name: User Service
        url: /user/v3/api-docs
      - name: Payment Service
        url: /payment/v3/api-docs
      - name: Notification Service
        url: /notification/v3/api-docs
      - name: Search Service
        url: /search/v3/api-docs
      - name: Analytics Service
        url: /analytics/v3/api-docs