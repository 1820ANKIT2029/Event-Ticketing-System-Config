spring:
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userIdKeyResolver}"

            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1000
                redis-rate-limiter.burstCapacity: 1500
                key-resolver: "#{@globalKeyResolver}"

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  # - https://ticketbooking.com
                  - http://localhost:3000
                allowedMethods:
                  - "*"
                allowedHeaders:
                  - "*"
                allowCredentials: true

  data:
    redis:
      host: redis
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

  instance:
    prefer-ip-address: true