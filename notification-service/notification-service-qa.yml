spring:
  profiles: qa
  datasource:
    url: jdbc:mysql://mysql-notification-qa:3306/notification_service_qa
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${NOTIFICATION_DB_USERNAME:notification}
    password: ${NOTIFICATION_DB_PASSWORD:password}
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
