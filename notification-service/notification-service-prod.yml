spring:
  datasource:
    url: jdbc:mysql://mysql-notification:3306/notification_service
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${NOTIFICATION_DB_USERNAME:notification}
    password: ${NOTIFICATION_DB_PASSWORD:password}
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
notification:
  email:
    smtp:
      host: ${SMTP_HOST:smtp.example.com}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME}
      password: ${SMTP_PASSWORD}
