spring:
  datasource:
    url: jdbc:mysql://mysql-payment-qa:3306/payment_service_qa
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${PAYMENT_DB_USERNAME:payment}
    password: ${PAYMENT_DB_PASSWORD:password}
