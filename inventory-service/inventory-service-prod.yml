spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/inventory_db
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:inventory_service_user}
    password: ${DB_PASSWORD:inventory_service_user}

  jpa:
    hibernate:
      # ddl-auto: validate
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

  instance:
    prefer-ip-address: true